on:
  push:
    branches:
      - master

name: Release

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.CUSTOM_PAT_WITH_WORKFLOWS_ACCESS }}
          config-file: release-please-config.json
